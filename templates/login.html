<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200">
        <div class="px-6 py-4 border-b border-slate-200">
          <h1 class="text-center text-lg font-bold tracking-wide">LOGIN</h1>
        </div>

        <div class="p-6">
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              <div class="space-y-2 mb-4">
                {% for category, msg in messages %}
                  <div class="text-sm rounded-lg px-3 py-2 border {{ 'border-red-200 bg-red-50 text-red-700' if category=='error' else 'border-amber-200 bg-amber-50 text-amber-700' }}">
                    {{ msg }}
                  </div>
                {% endfor %}
              </div>
            {% endif %}
          {% endwith %}

          <form method="post" action="{{ url_for('auth.login_post') }}" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-slate-700" for="userid">User ID</label>
              <input
                class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                type="text"
                name="userid"
                id="userid"
                autocomplete="username"
                required
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700" for="password">Password</label>
              <input
                class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                type="password"
                name="password"
                id="password"
                autocomplete="current-password"
                required
              />
            </div>

            <button class="w-full rounded-xl bg-blue-600 text-white font-semibold py-2.5 hover:bg-blue-700 transition" type="submit">
              Login
            </button>

            <div class="text-center">
              <a class="mt-3 inline-block text-xs text-blue-700 hover:text-blue-800" href="{{ url_for('main.signup') }}">
                No account yet? Sign up here
              </a>
            </div>
          </form>
        </div>
      </div>

      <p class="mt-4 text-center text-xs text-slate-500">
        Powered by Flask + HTMX (no React/Vue)
      </p>
    </div>
  </body>
</html>
