<div class="rounded-lg bg-slate-50 border border-slate-200 p-3" id="grade-row-{{ g.id_nilai }}-{{ g.nis }}">
  <div class="flex items-start justify-between gap-3">
    <div>
      <div class="text-sm font-semibold">{{ g.pelajaran }}</div>
      <div class="text-xs text-slate-600">Semester: {{ g.semester }} · {{ g.keterangan_nilai or '' }}</div>
    </div>
    <div class="text-right">
      <div class="text-sm font-medium">Nilai: {{ g.nilai or '-' }}</div>
      <div class="text-xs text-slate-500">KKM: {{ g.kkm or '-' }}</div>
    </div>
  </div>
  <div class="mt-3 flex items-center gap-2">
    <button class="rounded-lg bg-indigo-600 text-white px-3 py-1 text-xs font-semibold hover:bg-indigo-700"
            type="button"
            hx-get="{{ url_for('main.edit_grade_form', id_nilai=g.id_nilai, nis=g.nis) }}"
            hx-target="#grade-row-{{ g.id_nilai }}-{{ g.nis }}"
            hx-swap="outerHTML">Edit</button>
    <button class="rounded-lg border border-red-300 text-red-600 px-3 py-1 text-xs font-semibold hover:bg-red-50"
            type="button"
            hx-delete="{{ url_for('main.delete_detail', id_nilai=g.id_nilai, nis=g.nis) }}"
            hx-target="#grade-row-{{ g.id_nilai }}-{{ g.nis }}"
            hx-swap="outerHTML"
            hx-confirm="Hapus nilai ini?">Delete</button>
  </div>
</div>
