<form
  class="space-y-4"
  hx-post="{{ url_for('main.edit_grade') }}"
  hx-target="#grade-row-{{ grade.id_nilai }}-{{ grade.nis }}"
  hx-swap="outerHTML"
>
  <input type="hidden" name="id_nilai" value="{{ grade.id_nilai }}" />
  <input type="hidden" name="nis" value="{{ grade.nis }}" />

  <div class="flex items-center gap-3">
    <input
      name="nilai"
      type="number"
      step="0.01"
      class="w-32 rounded-xl border border-slate-300 px-3 py-2"
      value="{{ grade.nilai }}"
      required
    />
    <button class="rounded-xl bg-blue-600 px-4 py-2 text-white font-semibold hover:bg-blue-700" type="submit">
      Update
    </button>
    <button
      type="button"
      class="rounded-xl border border-slate-300 px-4 py-2 text-slate-700 font-semibold hover:bg-slate-50"
      hx-get="{{ url_for('main.dashboard') }}"
      hx-target="#dashboard-wrap"
      hx-swap="outerHTML"
    >
      Cancel
    </button>
  </div>
</form>
