<form
  class="space-y-4"
  hx-post="{{ url_for('main.add_grade') }}"
  hx-swap="none"
>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-slate-700" for="nis">NIS</label>
      <select name="nis" id="nis" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" required>
        {% for s in students %}
          <option value="{{ s.nis }}">{{ s.nis }} - {{ s.nama_depan }} {{ s.nama_belakang }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700" for="kode_pelajaran">Pelajaran</label>
      <select name="kode_pelajaran" id="kode_pelajaran" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" required>
        {% for p in pelajaran %}
          <option value="{{ p.kode_pelajaran }}">{{ p.pelajaran }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700" for="semester">Semester</label>
      <input name="semester" id="semester" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" placeholder="Ganjil / Genap" />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700" for="tahun_ajaran">Tahun Ajaran</label>
      <input name="tahun_ajaran" id="tahun_ajaran" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" placeholder="2024/2025" />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700" for="nilai">Nilai</label>
      <input name="nilai" id="nilai" type="number" step="0.01" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" required />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700" for="keterangan_nilai">Keterangan (opsional)</label>
      <input name="keterangan_nilai" id="keterangan_nilai" value="tugas 1" class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2" />
    </div>
  </div>

  <div class="flex items-center justify-between gap-3">
    <button class="rounded-xl bg-blue-600 px-4 py-2 text-white font-semibold hover:bg-blue-700" type="submit">
      Save Grade
    </button>
    <button
      class="rounded-xl border border-slate-300 px-4 py-2 text-slate-700 font-semibold hover:bg-slate-50"
      type="button"
      hx-get="{{ url_for('main.dashboard') }}"
      hx-target="#dashboard-wrap"
      hx-swap="outerHTML"
    >
      Cancel
    </button>
  </div>
</form>
